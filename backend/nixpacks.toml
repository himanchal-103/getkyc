cat > backend/nixpacks.toml << 'EOF'
[phases.setup]
nixPkgs = ["python313"]

[phases.install]
cmds = ["pip install -r ../requirements.txt"]

[phases.build]
cmds = ["python manage.py migrate && python manage.py collectstatic --noinput"]

[start]
cmd = "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
EOF